<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MKU Campus Guide</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1e3a8a;
      --accent: #3b82f6;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      padding: 24px 16px;
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
    }

    .tag {
      font-size: 13px;
      opacity: 0.9;
    }

    h1 {
      font-size: 28px;
      margin-top: 6px;
    }

    .subtitle {
      margin-top: 6px;
      opacity: 0.9;
    }

    .search-box {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      min-width: 220px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #0f172a;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    main {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .section-title {
      margin: 20px 0 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .shortcuts {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .chip {
      background: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #e5e7eb;
      transition: 0.2s;
    }

    .chip:hover {
      background: var(--accent);
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      padding: 16px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card h3 {
      font-size: 16px;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: var(--muted);
    }

    footer {
      text-align: center;
      padding: 30px 10px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="tag">MKU Campus Guide</div>
    <h1>Find your way around campus easily</h1>
    <p class="subtitle">Search buildings, offices, and student services instantly</p>

    <div class="search-box">
      <input id="search" placeholder="Search library, admissions, labs..." />
      <button id="searchBtn">Search</button>
    </div>
  </div>
</header>

<main>

  <div class="section-title">Quick Access</div>
  <div class="shortcuts">
    <div class="chip">Admissions</div>
    <div class="chip">Library</div>
    <div class="chip">Lecture Halls</div>
    <div class="chip">Computer Labs</div>
    <div class="chip">Student Services</div>
  </div>

  <div class="section-title">Campus Directory</div>
  <div id="results" class="grid"></div>

</main>

<footer>
  MKU Campus Guide • Built for students
</footer>

<script src="app.js"></script>

</body>
</html>
